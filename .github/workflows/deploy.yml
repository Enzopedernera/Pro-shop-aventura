name: Deploy a Donweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Subir archivos a Donweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: c1382531.ferozo.com
          username: c1382531
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/scss/**
            **/.env
            **/server/**
            **/package*.json
            **/.gitignore
            **/.hintrc