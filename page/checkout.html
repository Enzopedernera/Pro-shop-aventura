<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />

    <meta
      name="description"
      content="Confirmá tu reserva de equipos de ski y snowboard en Aventura Pro Shop."
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>Confirmar Reserva — Aventura Pro Shop</title>
    <link rel="icon" href="../img/home/logo1.webp" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <div class="overlay" id="overlay"></div>

    <main class="checkout-main">
      <div class="checkout-container">
        <!-- COLUMNA IZQUIERDA -->
        <div class="checkout-form-col">
          <!-- RESUMEN DE FECHAS PRE-CARGADAS -->
          <div
            class="checkout-fechas-resumen"
            id="checkoutFechasResumen"
            style="display: none"
          >
            <span class="checkout-fechas-icon">📅</span>
            <span id="checkoutFechasTexto"></span>
            <a href="../index.html" class="checkout-fechas-cambiar"
              >Cambiar fechas</a
            >
          </div>

          <h1 class="checkout-titulo">
            Reserva de equipos - Aventura Pro Shop
          </h1>

          <!-- PASO 1 — DATOS CLIENTE -->
          <div class="checkout-card">
            <div class="checkout-card-header">
              <span class="checkout-step">1</span>
              <h2>Tus datos</h2>
            </div>
            <form id="formReserva">
              <div class="checkout-grid">
                <div class="campo">
                  <label for="nombre">Nombre y apellido *</label>
                  <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    required
                    placeholder="Juan Pérez"
                  />
                </div>
                <div class="campo">
                  <label for="email">Email *</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="juan@email.com"
                  />
                </div>
                <div class="campo">
                  <label for="dni">DNI</label>
                  <input
                    type="text"
                    id="dni"
                    name="dni"
                    placeholder="12345678"
                    pattern="\d{7,8}"
                    title="Ingresá tu DNI sin puntos (7 u 8 dígitos)"
                  />
                </div>
                <div class="campo">
                  <label for="telefono">Teléfono</label>
                  <input
                    type="tel"
                    id="telefono"
                    name="telefono"
                    placeholder="+54 9 294 000 0000"
                  />
                </div>
              </div>
            </form>
          </div>

          <!-- PASO 2 — CANTIDAD ESQUIADORES -->
          <div class="checkout-card">
            <div class="checkout-card-header">
              <span class="checkout-step">2</span>
              <h2>¿Cuántos esquiadores?</h2>
            </div>
            <div class="cantidad-esquiadores">
              <button type="button" class="cant-btn" id="btnMenosEsq">−</button>
              <span class="cant-num" id="numEsq">1</span>
              <button type="button" class="cant-btn" id="btnMasEsq">+</button>
              <span class="cant-hint">máximo 10</span>
            </div>
          </div>

          <!-- PASO 3 — EQUIPOS POR ESQUIADOR -->
          <div class="checkout-card">
            <div class="checkout-card-header">
              <span class="checkout-step">3</span>
              <h2>Equipos por esquiador</h2>
            </div>
            <div id="listaEsquiadores"></div>
          </div>

          <!-- PASO 4 — NOTAS -->
          <div class="checkout-card">
            <div class="checkout-card-header">
              <span class="checkout-step">4</span>
              <h2>Notas adicionales</h2>
            </div>
            <div class="campo">
              <label for="notas">Comentarios o pedidos especiales</label>
              <textarea
                id="notas"
                name="notas"
                form="formReserva"
                placeholder="Ej: primera vez en nieve, necesito equipos para zurdo..."
              ></textarea>
            </div>
          </div>
        </div>

        <!-- COLUMNA DERECHA — RESUMEN -->
        <div class="checkout-resumen-col">
          <div class="checkout-card checkout-sticky">
            <div class="checkout-card-header">
              <span class="checkout-step">📋</span>
              <h2>Resumen</h2>
            </div>

            <div id="resumenLista" class="checkout-lista"></div>

            <div class="checkout-totales">
              <div class="checkout-total-row">
                <span>Total por día</span>
                <span id="totalDia">$0</span>
              </div>
              <div class="checkout-total-row checkout-total-final">
                <span>Total reserva</span>
                <span id="totalReserva">$0</span>
              </div>
            </div>

            <div class="hts-privacy-agree">
              <label>
                <input type="checkbox" id="checkPrivacidad" />
                Acepté los
                <a href="./privacidad.html?from=checkout"
                  >Términos y condiciones</a
                >
                y la
                <a href="./privacidad.html?from=checkout"
                  >Política de privacidad</a
                >.
              </label>
            </div>

            <button
              type="submit"
              form="formReserva"
              id="btnConfirmar"
              class="btn checkout-btn-confirmar"
            >
              Confirmar reserva →
            </button>

            <a href="./tarifas.html" class="checkout-volver"
              >← Volver a tarifas</a
            >
          </div>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>

    <script src="../precios.js" defer></script>
    <script src="../script.js" defer></script>
    <script src="../components/components.js" defer></script>
  </body>
</html>
